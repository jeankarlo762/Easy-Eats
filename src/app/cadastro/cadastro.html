<body>
  <div class="full-screen-background">
    <div class="container">
      <div class="cadastro-box">
        <div class="header">
          <div class="logo">
            <img src="/assets/images/logo-easyeats-carrinho2.png" alt="Logo" />
          </div>

          <h1 class="cadastro">Cadastro Garçom</h1>
        </div>

        <div class="form-group">
          <label>Nome Completo</label>
          <input type="text" placeholder="Seu nome completo" name="nome" />
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" placeholder="seu@email.com" name="email" />
        </div>

        <div class="form-group">
          <label>Telfone</label>
          <input
            type="text"
            placeholder="(00) 00000-0000"
            maxlength="15"
            name="telefone"
            [(ngModel)]="telefone"
            (input)="formatarTelefone()"
          />
        </div>

        <div class="form-group">
          <label>CPF</label>
          <input
            type="text"
            name="cpf"
            placeholder="000.000.000-00"
            title="Digite apenas números, sem pontos ou traço"
            maxlength="14"
            [(ngModel)]="cpf"
            (input)="formatarCpf()"
          />
        </div>

        <div class="password-field">
          <label>Senha</label>
          <input type="password" placeholder="••••••••" name="senha" />
        </div>

        <div>
          <label>Imagem de Perfil:</label>
          <input type="file" name="profileImage" accept="image/*" />
        </div>

        <button type="submit" class="cadastro-button">Cadastrar</button>
      </div>
    </div>
  </div>
</body>
