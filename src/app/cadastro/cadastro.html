<body>
  <div class="container">
    <div class="cadastro-box">
      <div class="header">
        <div class="logo">
          <img src="/assets/images/logo-easyeats-carrinho2.png" />
        </div>
        <h1 class="cadastro">Cadastro Garçom</h1>
      </div>

      <form [formGroup]="form" (ngSubmit)="salvar()">
        <div class="form-group">
          <label>Nome Completo</label>
          <input type="text" placeholder="Seu nome completo" formControlName="nome" />

          <small *ngIf="form.get('nome')?.touched && form.get('nome')?.errors">
            {{ mensagensValidacoes.nome.required }}
          </small>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" placeholder="seu@email.com" formControlName="email" />

          <small *ngIf="form.get('email')?.touched && form.get('email')?.errors">
            <span *ngIf="form.get('email')?.errors?.['required']">
              {{ mensagensValidacoes.email.required }}
            </span>
            <span *ngIf="form.get('email')?.errors?.['email']">
              {{ mensagensValidacoes.email.email }}
            </span>
          </small>
        </div>

        <div class="form-group">
          <label>Telefone</label>
          <input type="text" placeholder="(00) 00000-0000" formControlName="telefone" />

          <small *ngIf="form.get('telefone')?.touched && form.get('telefone')?.errors">
            {{ mensagensValidacoes.telefone.required }}
          </small>
        </div>

        <div class="form-group">
          <label>CPF</label>
          <input type="text" placeholder="000.000.000-00" formControlName="cpf" />

          <small *ngIf="form.get('cpf')?.touched && form.get('cpf')?.errors">
            {{ mensagensValidacoes.cpf.required }}
          </small>
        </div>

        <div class="password-field">
          <label>Senha</label>
          <input type="password" placeholder="••••••••" formControlName="senha" />
        </div>
        <button type="button" (click)="togglePassword()" class="toggle-password">
              {{ showPassword ? 'Ocultar' : 'Mostrar' }}
            </button>

        <div class="password-field">
          <label>Confirmar Senha</label>
          <input type="password" placeholder="••••••••" formControlName="confirmarSenha" 
          />
           <button type="button" (click)="togglePasswordDown()" class="toggle-password-2">
              {{ showPasswordDown ? 'Ocultar' : 'Mostrar' }}
            </button>
        </div>
       

        <div class="file-group">
          <label>Imagem de Perfil:</label>
          <input type="file" />
        </div>

        <button type="submit" class="cadastro-button">Cadastrar</button>
        <p class="login-link">
          <a href="/login">Já tem uma conta? Faça login</a>
        </p>
      </form>
    </div>
  </div>
</body>
